<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Calculator</title>
</head>
<body>
	<div id="container">
		<div id="screen"></div>
		<div id="digits">
			<div>1</div>
			<div>2</div>
			<div>3</div>
			<div>4</div>
			<div>5</div>
			<div>6</div>
			<div>7</div>
			<div>8</div>
			<div>9</div>
			<div>0</div>
		</div>
		<div id="operators">
			<div>+</div>
			<div>-</div>
			<div>*</div>
			<div>/</div>
		</div>
		<div id="equal">=</div>
	</div>

<script src="script.js"></script>
</body>
</html>
